name: 游戏公司每日新闻抓取

on:
  schedule:
    - cron: "0 0 * * *"  # UTC 0:00 = 北京时间 8:00
  workflow_dispatch:

jobs:
  scrape-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: python scraper.py
      - name: Push to WeCom
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: python push_webhook.py
